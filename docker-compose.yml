services:
  postgres:
    image: postgres:18-alpine
    container_name: garden-postgres
    environment:
      POSTGRES_DB: medusa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medusa"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./garden-for-you-backend
      dockerfile: Dockerfile
    container_name: garden-backend
    env_file:
      - ./garden-for-you-backend/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9000:9000"
    volumes:
      - backend_uploads:/app/.medusa/server/static

  storefront:
    build:
      context: ./garden-for-you
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* are inlined into the bundle at build time (the runtime
      # env_file cannot set them), so they must be passed as build args.
      # These are public, client-visible values — safe to keep here.
      args:
        NEXT_PUBLIC_MEDUSA_URL: http://localhost:9000
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_9303fd5637479314ce699b4c8d737a9f5399f0eaa6233450a7bc06194356d61f
        NEXT_PUBLIC_REGION_ID: reg_01KM2M4TDY3QZCFRWGXS8Z7ZRJ
        NEXT_PUBLIC_SITE_URL: https://saddlyavas.by
        NEXT_PUBLIC_CONTENT_TABLE_URL: https://opensheet.elk.sh/1hJ-RtQcunzHH27qO-LTnZoPpFjiFL5yfTIXKUyMCYmc/
    container_name: garden-storefront
    env_file:
      - ./garden-for-you/.env.docker
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  backend_uploads:
